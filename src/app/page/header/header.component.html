<agari-header-bar>
  <agari-header-bar-brand>
    <a mat-button routerLink="/" class="agari-brand">{{ brand }}</a>
  </agari-header-bar-brand>
  <agari-header-bar-menu>
    <button
      mat-icon-button
      [matMenuTriggerFor]="rootMenu"
      aria-label="Menu button"
    >
      <mat-icon>menu</mat-icon>
    </button>
  </agari-header-bar-menu>
</agari-header-bar>

<mat-menu #rootMenu="matMenu">
  <a
    *ngFor="let route of displayedRoutes"
    mat-menu-item
    [routerLink]="route.path!"
    >{{ route.label }}</a
  >
</mat-menu>
