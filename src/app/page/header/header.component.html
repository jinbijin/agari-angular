<agari-header-bar>
  <agari-header-bar-brand>
    <a agariButton color="primary" routerLink="/">{{ brand }}</a>
  </agari-header-bar-brand>
  <agari-header-bar-menu>
    <a agariButton color="primary" *ngFor="let route of displayedRoutes" [routerLink]="route.path!">{{ route.label }}</a>
  </agari-header-bar-menu>
</agari-header-bar>
